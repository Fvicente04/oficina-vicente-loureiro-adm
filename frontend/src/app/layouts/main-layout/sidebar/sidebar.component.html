<aside class="sidebar">

  <!-- Logo -->
  <div class="sidebar__logo">
    <span class="sidebar__logo-line1">OFICINA</span>
    <span class="sidebar__logo-accent">VICENTE</span>
    <span class="sidebar__logo-line2">LOUREIRO</span>
    <span class="sidebar__logo-sub">SISTEMA DE GESTÃO</span>
  </div>

  <!-- Nav -->
  <nav class="sidebar__nav">
    @for (item of menuItems; track item.id) {
      <a
        class="sidebar__nav-item"
        [routerLink]="item.route"
        routerLinkActive="sidebar__nav-item--active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
      >
        <span class="sidebar__nav-icon" [innerHTML]="getIcon(item.icon)"></span>
        <span class="sidebar__nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Footer -->
  <div class="sidebar__footer">
    <div class="sidebar__user">
      <div class="sidebar__user-avatar">VL</div>
      <div class="sidebar__user-info">
        <span class="sidebar__user-name">Admin</span>
        <span class="sidebar__user-role">Administrador</span>
      </div>
    </div>
  </div>

</aside>
