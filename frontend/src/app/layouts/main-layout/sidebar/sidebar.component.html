<aside class="sidebar">

  <!-- Logo -->
  <div class="sidebar__logo">
    <div class="sidebar__logo-icon">
      <svg width="176" height="52" viewBox="0 0 176 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- body outline -->
        <path d="M6 36 C6 36 10 24 20 19 L38 11 C50 6 68 4 88 4 L112 4 C130 4 146 8 156 16 L168 25 L172 34 L168 37" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- windshield -->
        <path d="M62 11 C70 5 82 3 96 3 L110 3 C120 3 130 7 136 13" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
        <!-- base line -->
        <path d="M6 37 L22 37" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M52 37 L118 37" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M148 37 L172 37" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <!-- rear wheel -->
        <circle cx="36" cy="38" r="11" stroke="white" stroke-width="1.8"/>
        <circle cx="36" cy="38" r="4" stroke="white" stroke-width="1.2" opacity="0.5"/>
        <!-- front wheel -->
        <circle cx="134" cy="38" r="11" stroke="white" stroke-width="1.8"/>
        <circle cx="134" cy="38" r="4" stroke="white" stroke-width="1.2" opacity="0.5"/>
      </svg>
    </div>
    <div class="sidebar__logo-text">
      <span class="sidebar__logo-name">VICENTE LOUREIRO</span>
      <span class="sidebar__logo-tagline">LANTERNAGEM &amp; PINTURA</span>
      <span class="sidebar__logo-system">SISTEMA DE GESTÃO</span>
    </div>
  </div>

  <!-- Nav -->
  <nav class="sidebar__nav">
    @for (item of menuItems; track item.id) {
      <a
        class="sidebar__nav-item"
        [routerLink]="item.route"
        routerLinkActive="sidebar__nav-item--active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
      >
        <span class="sidebar__nav-icon" [innerHTML]="getIcon(item.icon)"></span>
        <span class="sidebar__nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Footer -->
  <div class="sidebar__footer">
    <div class="sidebar__user">
      <div class="sidebar__user-avatar">VL</div>
      <div class="sidebar__user-info">
        <span class="sidebar__user-name">Admin</span>
        <span class="sidebar__user-role">Administrador</span>
      </div>
    </div>
  </div>

</aside>
