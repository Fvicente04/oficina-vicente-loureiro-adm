<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <img src="assets/logo.png" alt="Vicente Loureiro" class="login-brand__logo" />
      <p class="login-brand__subtitle">SISTEMA DE GESTÃO</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input
          id="email"
          type="email"
          class="form-input"
          formControlName="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="form-error">E-mail inválido</span>
        }
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input
          id="password"
          type="password"
          class="form-input"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="form-error">Senha deve ter no mínimo 6 caracteres</span>
        }
      </div>

      @if (error()) {
        <div class="alert alert--danger">{{ error() }}</div>
      }

      <button
        type="submit"
        class="btn btn--primary btn--full"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="spinner spinner--sm"></span>
          Entrando...
        } @else {
          Entrar
        }
      </button>
    </form>
  </div>
</div>
